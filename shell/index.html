  <script>
    (function () {
      try {
        var key = "pockit.pendingDeepLink";
        var hash = location.hash || "";
        var hm = hash.match(/^#\/c\/([\w-]+)$/);
        if (hm) {
          sessionStorage.setItem(key, hm[1]);
          return;
        }
        var path = (location.pathname || "").replace(/\/$/, "") || "/";
        var pm = path.match(/^\/c\/([\w-]+)$/);
        if (pm) {
          sessionStorage.setItem(key, pm[1]);
          return;
        }
        var params = new URLSearchParams(location.search || "");
        var qc = params.get("c") || params.get("cassette");
        if (qc && /^[\w-]+$/.test(qc)) sessionStorage.setItem(key, qc);
      } catch (_) {}
    })();
  </script>

    </span>
  </button>

    <aside id="player-rail" class="player-rail sidebar">
      <button type="button" id="player-rail-handle" class="rail-drawer-handle rail-drawer-handle--player" aria-expanded="true" aria-controls="player-rail-content" aria-label="Collapse players drawer" data-comet-tip="Collapse players drawer&#10;Slide the left rail closed">
        <span class="rail-drawer-handle__tab" aria-hidden="true">

          <span class="rail-drawer-handle__label">Players</span>
        </span>
      </button>

        <div id="player-rail-dropdown" class="player-rail-dropdown-mount rail-dropdown-mount"></div>
      </header>
      <div id="player-rail-content" class="sidebar-content">
        <div class="loading">Loading…</div>
      </div>
      <footer class="sidebar-footer comet-status-bar comet-status-bar--sidebar sidebar-footer--rail-dock player-rail-dock sidebar-footer--account-only" role="contentinfo">
        <div class="rail-dock-bar rail-dock-bar--account">
          <div class="auth-status" id="auth-status"></div>
        </div>
      </footer>
    </aside>

    <main id="main-frame" class="main-frame pockit-shell-zone" data-pockit-zone="center-column">

              <div class="pockit-widget pockit-widget--player-rail-toggle" data-widget="player-rail-toggle">

                </button>
              </div>
              <div class="pockit-widget pockit-widget--main-console-picker hidden" data-widget="main-console-picker">
                <div id="main-header-console-picker" class="main-header-console-picker-mount" aria-label="Active console"></div>
              </div>
              <div class="pockit-widget pockit-widget--hub-back hidden" data-widget="hub-back">
                <button type="button" id="hub-back-btn" class="icon-btn hub-back-btn hidden ant-btn-icon-only" data-comet-tip="Back to overview&#10;Return to the Pockit home grid" data-ant-icon="ArrowLeftOutlined" aria-label="Back to Pockit"><span class="hub-back-label">Pockit</span></button>
              </div>
            </div>
          </div>
          <div class="pockit-layout-col pockit-layout-col--title main-breadcrumb-wrap" id="main-breadcrumb-wrap" data-layout-col="title" data-pockit-zone="toolbar-title">
            <div class="pockit-widget-stack pockit-widget-stack--title" data-widget-stack="title">

              <div class="pockit-widget pockit-widget--status-rail" data-widget="status-rail">

            </div>
          </div>
          <div class="pockit-layout-col pockit-layout-col--trailing main-actions" data-layout-col="trailing" data-pockit-zone="toolbar-trailing">
            <div class="pockit-widget-stack pockit-widget-stack--trailing" data-widget-stack="trailing">
              <div class="pockit-widget pockit-widget--cassette-settings hidden" data-widget="cassette-settings">

              </div>
              <div class="pockit-widget pockit-widget--new-tab hidden" data-widget="new-tab">

              </div>
              <div class="pockit-widget pockit-widget--bonjour" data-widget="bonjour">

              </div>
              <div class="pockit-widget pockit-widget--cassette-rail-toggle" data-widget="cassette-rail-toggle">
                <button type="button" id="cassette-rail-toggle" class="icon-btn icon-btn--finder ant-btn-icon-only" data-ant-icon="MenuFoldOutlined" data-comet-tip="Hide cassettes rail&#10;Focus on the active tape" aria-label="Hide cassettes" aria-expanded="true">

                </button>
              </div>
