<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Family SSO — opening door</title>
  <link rel="stylesheet" href="/app-boot-panel.css" />
</head>
<body class="boot-panel">
  <div class="boot-panel__card" role="status" aria-live="polite">
    <h1 class="boot-panel__title" id="boot-title">Family door</h1>
    <p class="boot-panel__subtitle" id="boot-subtitle">Checking your session…</p>
    <div class="boot-panel__steps" id="boot-steps"></div>
    <p class="boot-panel__hint">Opening your app — this can take a moment on first launch.</p>
  </div>
  <script src="/app-boot-panel.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const target = params.get("target");
      const ui = AppBootPanel.mountBootPanel({
        title: "Family door",
        steps: [
          { id: "session", label: "Family session" },
          { id: "ticket", label: "Door ticket" },
          { id: "door", label: "Open tape door" },
        ],
      });

      if (!target) {
        ui.setStep("session", "fail", "Missing ?target= URL");
        ui.setMessage("Cannot open door — bad hop link.");
        return;
      }

      ui.setStep("session", "running", "Checking sign-in…");
      try {
        ui.setStep("session", "ok", "Session ready");
        ui.setStep("ticket", "running", "Minting SSO ticket…");
        const r = await fetch(
          "/api/v1/auth/door-ticket?target=" + encodeURIComponent(target),
          { credentials: "include", cache: "no-store" },
        );
        const j = await r.json();
        if (j.ok && j.redeem_url) {
          ui.setStep("ticket", "ok");
          ui.setStep("door", "running", "Redirecting…");
          ui.setMessage("Opening your cassette…");
          await new Promise((res) => setTimeout(res, 350));
          location.replace(j.redeem_url);
          return;
        }
        if (r.status === 401) {
          ui.setStep("ticket", "running", "Sign-in required…");
          ui.setMessage("Redirecting to family sign-in…");
          const back = encodeURIComponent(location.pathname + location.search);
          location.replace("/signin?callbackUrl=" + back);
          return;
        }
        ui.setStep("ticket", "warn", "Ticket unavailable — opening door directly");
      } catch (e) {
        ui.setStep("ticket", "warn", "SSO hop failed — opening directly");
      }
      ui.setStep("door", "running");
      ui.setMessage("Opening door…");
      await new Promise((res) => setTimeout(res, 300));
      location.replace(target);
    })();
  </script>
</body>
</html>
